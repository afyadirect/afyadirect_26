services:
  backend:
    build: .
    container_name: afyadirect-backend
    ports:
      - "8080:8000"
    environment:
      # Use the service name 'redis_new' as the hostname
      - REDIS_URL=redis://redis_new:6379
      - APP_ENV=production
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - ALLOWED_FILE_TYPES=["image/jpeg","image/png"]

    depends_on:
      - redis_new
    volumes:
      - .:/app
      - ./firebase-adminsdk.json:/app/firebase-adminsdk.json
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - afyadirect-network

  redis_new:
    image: redis:7-alpine
    container_name: afyadirect-redis-v2
    init: true  # <--- CRITICAL: Prevents the "permission denied" zombie state
    ports:
      - "6385:6379"
    volumes:
      - redis-data-v2:/data
    restart: always # <--- Changed to always for better recovery
    networks:
      - afyadirect-network

  celery-worker:
    build: .
    container_name: afyadirect-celery-worker
    # Ensure this path matches your directory structure (e.g., app/worker.py)
    command: celery -A app.worker worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis_new:6379
      - APP_ENV=production
      - PYTHONPATH=/app # <--- Helps Celery find your modules
    depends_on:
      - redis_new
      - backend
    volumes:
      - .:/app
    restart: unless-stopped
    networks:
      - afyadirect-network

  celery-beat:
    build: .
    container_name: afyadirect-celery-beat
    command: celery -A app.worker beat --loglevel=info
    environment:
      - REDIS_URL=redis://redis_new:6379
      - APP_ENV=production
      - PYTHONPATH=/app
    depends_on:
      - redis_new
      - backend
    volumes:
      - .:/app
    restart: unless-stopped
    networks:
      - afyadirect-network

networks:
  afyadirect-network:
    driver: bridge

volumes:
  redis-data-v2: